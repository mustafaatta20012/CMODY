version: "3.9"

# ═══════════════════════════════════════════════
#  GODMODE STORE — Docker Compose (Development)
#  Run: docker-compose up -d
# ═══════════════════════════════════════════════

services:
  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: godmode_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-godmode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-godmode_secret_2026}
      POSTGRES_DB: ${POSTGRES_DB:-godmode_store}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-godmode} -d ${POSTGRES_DB:-godmode_store}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - godmode_net

  # ── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: godmode_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_2026} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - godmode_net

  # ── pgAdmin (DB GUI) ─────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: godmode_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@godmode.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-Admin@godmode2026}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - godmode_net

  # ── API Server ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: godmode_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-godmode}:${POSTGRES_PASSWORD:-godmode_secret_2026}@postgres:5432/${POSTGRES_DB:-godmode_store}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_2026}@redis:6379
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - .:/app
      - /app/node_modules      # don't overwrite node_modules from host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - godmode_net
    command: npm run dev
    profiles:
      - full   # only starts with: docker-compose --profile full up

# ═══════════════════════════════════════════════
#  VOLUMES & NETWORKS
# ═══════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  godmode_net:
    driver: bridge
